<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Agent Profit Fit</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="page">
<section class="hero">
<p class="eyebrow">Free diagnostic tool</p>
<h1>AI Agent Profit Fit</h1>
<p>AIエージェント化で、どの業務から改善すると効果が出やすいかを3分で整理します。</p>
</section>
<section class="panel">
<form id="fitForm">
<label>立場<select id="role"><option value="creator">クリエイター</option><option value="freelancer">フリーランス</option><option value="shop">店舗・個人事業</option><option value="company">小規模会社</option></select></label>
<label>詰まっている作業<select id="pain"><option value="support">問い合わせ対応</option><option value="content">投稿・記事制作</option><option value="lead">見込み客集め</option><option value="estimate">見積もり・提案</option><option value="onboarding">購入後フォロー</option></select></label>
<label>月の問い合わせ数<input id="leads" type="number" min="0" value="100"></label>
<label>平均単価（円）<input id="price" type="number" min="0" value="2980"></label>
<label>現在の成約率（%）<input id="closeRate" type="number" min="0" max="100" value="3"></label>
<label>手作業時間（週）<input id="hours" type="number" min="0" value="5"></label>
<label>1時間の価値（円）<input id="hourly" type="number" min="0" value="1500"></label>
<button>診断する</button>
</form>
</section>
<section id="result" class="result hidden">
<h2 id="scoreTitle"></h2>
<div class="meter"><span id="meterBar"></span></div>
<p id="scoreText"></p>
<div class="cards"><article><h3>最初の自動化</h3><p id="agentPlan"></p></article><article><h3>月間インパクト</h3><p id="impact"></p></article><article><h3>売る一言</h3><p id="offer"></p></article></div>
<div class="box"><h3>設計プロンプト</h3><button id="copyPrompt" type="button">コピー</button><pre id="promptOutput"></pre></div>
<div class="box"><h3>7日間の実行順</h3><ol id="sevenDays"></ol></div>
</section>
<p class="notice">この診断は収益を保証するものではありません。入力値から改善仮説を作るためのツールです。</p>
</main>
<script src="app.js"></script>
</body>
</html>
